apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret

metadata:
  name: payment-secret

spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secret-store
    kind: SecretStore

  target:
    name: payment-secret

  data:
  - secretKey: DB_PASSWORD
    remoteRef:
      key: payment-service-secret
      property: DB_PASSWORD