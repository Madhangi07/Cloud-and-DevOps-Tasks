apiVersion: apps/v1
kind: Deployment

metadata:
  name: payment-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: payment-service

  template:
    metadata:
      labels:
        app: payment-service

    spec:
      containers:
      - name: payment-service
        image: payment-service:v1

        env:
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: payment-secret
              key: JWT_SECRET