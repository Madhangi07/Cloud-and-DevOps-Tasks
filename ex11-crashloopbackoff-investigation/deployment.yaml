apiVersion: apps/v1
kind: Deployment

metadata:
  name: payment-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: payment-service

  template:
    metadata:
      labels:
        app: payment-service

    spec:
      containers:
      - name: payment-service
        image: payment-service:v1

        env:
        - name: DB_HOST
          value: postgres-service

        - name: DB_PORT
          value: "5432"

        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: payment-secret
              key: username

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: payment-secret
              key: password