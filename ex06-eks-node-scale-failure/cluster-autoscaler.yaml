apiVersion: apps/v1
kind: Deployment

metadata:
  name: cluster-autoscaler
  namespace: kube-system

spec:
  replicas: 1

  selector:
    matchLabels:
      app: cluster-autoscaler

  template:
    metadata:
      labels:
        app: cluster-autoscaler

    spec:
      containers:
      - name: cluster-autoscaler
        image: registry.k8s.io/autoscaling/cluster-autoscaler:v1.29.0

        command:
        - ./cluster-autoscaler
        - --cloud-provider=aws
        - --node-group-auto-discovery=asg:tag=k8s.io/cluster-autoscaler/enabled