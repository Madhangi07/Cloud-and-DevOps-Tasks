apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: payment-service

spec:
  project: default

  source:
    repoURL: https://github.com/Madhangi07/Cloud-and-DevOps-Tasks.git
    targetRevision: main
    path: ex18-gitops-platform/gitops/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true